<div x-data="{ open: true }" x-show="open" class="relative z-50" role="dialog" aria-modal="true">
  <div class="fixed inset-0 bg-gray-900 bg-opacity-50 backdrop-blur-sm" @click="open = false"></div>

  <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
    <div class="flex min-h-full items-end justify-center p-4 sm:items-center sm:p-0">

      <div class="relative w-full max-w-lg bg-white rounded-2xl shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
          <div class="flex items-center gap-2">
            <i class="ph-bold ph-paper-plane-tilt text-blue-600 text-xl"></i>
            <h3 class="text-lg font-bold text-gray-900">Lançar Cotação (RFQ)</h3>
          </div>
          <button @click="open = false" class="text-gray-400 hover:text-gray-700 transition-colors">
            <i class="ph ph-x text-2xl"></i>
          </button>
        </div>

        <div class="p-6">
          <form hx-post="/api/purchasing/manual-quote"
                hx-target="#dialog-container"
                hx-swap="innerHTML"
                @htmx:after-request="if(event.detail.successful) open = false"
                class="space-y-5">

            <!-- Insumo + Quantidade -->
            <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl flex gap-3">
              <div class="flex-1">
                <label class="block text-[10px] font-bold text-blue-800 uppercase mb-1">O que cotar? *</label>
                <select name="supply_id" required
                  class="w-full px-3 py-2 rounded-lg border border-blue-200 text-sm focus:ring-2 focus:ring-blue-500 bg-white font-semibold text-gray-900">
                  <option value="">— Selecione o insumo —</option>
                  {% for sup in supplies %}
                  <option value="{{ sup.id }}"
                    {% if preselected_id and preselected_id == sup.id | string %}selected{% endif %}>
                    {{ sup.nome }} ({{ sup.unidade or 'un' }})
                  </option>
                  {% endfor %}
                </select>
              </div>
              <div class="w-28">
                <label class="block text-[10px] font-bold text-blue-800 uppercase mb-1">Quantidade *</label>
                <input type="number" name="qty_solicitada" step="0.01" min="0.01" required
                  value="{{ preselected_qty if preselected_qty and preselected_qty > 0 else '' }}"
                  placeholder="0.00"
                  class="w-full px-2 py-2 rounded-lg border border-blue-200 text-sm focus:ring-2 focus:ring-blue-500 text-right font-mono font-bold text-blue-900">
              </div>
            </div>

            <!-- Fornecedores -->
            <div>
              <div class="flex items-center justify-between mb-2">
                <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider">
                  Escolha os Fornecedores *
                </label>
                <span class="text-xs text-amber-600 font-medium">
                  <i class="ph-fill ph-warning"></i> Selecione ao menos um
                </span>
              </div>

              <div class="max-h-52 overflow-y-auto border border-slate-200 rounded-xl divide-y divide-slate-100 shadow-inner">
                {% for fornecedor in suppliers %}
                <label class="flex items-center gap-3 px-4 py-3 hover:bg-blue-50 cursor-pointer transition-colors">
                  <input type="checkbox" name="supplier_ids" value="{{ fornecedor.id }}"
                    class="w-5 h-5 text-blue-600 rounded border-gray-300 shrink-0">
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-bold text-gray-800 truncate">{{ fornecedor.nome }}</p>
                    <p class="text-[10px] text-gray-400 uppercase truncate">
                      {% if fornecedor.whatsapp %}<i class="ph ph-whatsapp-logo text-green-500"></i> {{ fornecedor.whatsapp }}{% endif %}
                      {% if fornecedor.email %} · <i class="ph ph-envelope text-blue-400"></i> {{ fornecedor.email }}{% endif %}
                    </p>
                  </div>
                  <div class="flex gap-1 shrink-0">
                    {% if fornecedor.whatsapp %}<span class="w-5 h-5 rounded-full bg-green-100 flex items-center justify-center"><i class="ph-fill ph-whatsapp-logo text-green-600 text-xs"></i></span>{% endif %}
                    {% if fornecedor.email %}<span class="w-5 h-5 rounded-full bg-blue-100 flex items-center justify-center"><i class="ph-fill ph-envelope text-blue-500 text-xs"></i></span>{% endif %}
                  </div>
                </label>
                {% else %}
                <div class="p-4 text-center text-sm text-gray-400">Nenhum fornecedor cadastrado.</div>
                {% endfor %}
              </div>
            </div>

            <button type="submit"
              class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-colors shadow-lg">
              <i class="ph-bold ph-paper-plane-tilt text-xl"></i> ENVIAR SOLICITAÇÕES DE COTAÇÃO
            </button>
          </form>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var c = document.getElementById('dialog-container');
  if (c && window.Alpine) Alpine.initTree(c);
})();
</script>
