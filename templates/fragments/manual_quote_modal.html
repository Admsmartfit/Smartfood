<div x-data="{ open: true }" x-show="open" class="relative z-50" aria-labelledby="modal-title" role="dialog" aria-modal="true">
  <div class="fixed inset-0 bg-gray-900 bg-opacity-50 backdrop-blur-sm transition-opacity" @click="open = false"></div>

  <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
    <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">

      <div class="relative transform overflow-hidden rounded-2xl bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg">

        <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
          <div class="flex items-center gap-2">
            <i class="ph-fill ph-paper-plane-tilt text-blue-600 text-xl"></i>
            <h3 class="text-lg font-bold text-gray-900" id="modal-title">Lançar Cotação Exata</h3>
          </div>
          <button @click="open = false" class="text-gray-400 hover:text-gray-700">
            <i class="ph ph-x text-2xl"></i>
          </button>
        </div>

        <div class="p-6 bg-white">
          <form hx-post="/api/purchasing/manual-quote"
                hx-target="#dialog-container"
                hx-swap="innerHTML"
                @submit="setTimeout(() => open = false, 500)"
                class="space-y-5">

            <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl flex flex-wrap sm:flex-nowrap gap-4">
              <div class="flex-1">
                <label class="block text-[10px] font-bold text-blue-800 uppercase mb-1">O que Cotar? *</label>
                <select name="item_data" required
                  class="w-full px-3 py-2 rounded border border-blue-200 text-sm focus:ring-2 focus:ring-blue-500 font-semibold text-gray-900">
                  <option value="">— Selecione o item —</option>

                  <optgroup label="Ingredientes (Alimentícios)">
                    {% for ing in ingredients %}
                    <option value="ingredient|{{ ing.id }}"
                      {% if preselected_val == 'ingredient|' ~ ing.id | string %}selected{% endif %}>
                      {{ ing.nome }} ({{ ing.unidade }})
                    </option>
                    {% endfor %}
                  </optgroup>

                  <optgroup label="Insumos (Embalagens, Limpeza)">
                    {% for sup in supplies %}
                    <option value="supply|{{ sup.id }}"
                      {% if preselected_val == 'supply|' ~ sup.id | string %}selected{% endif %}>
                      {{ sup.nome }} ({{ sup.unidade or 'un' }})
                    </option>
                    {% endfor %}
                  </optgroup>
                </select>
              </div>

              <div class="w-24">
                <label class="block text-[10px] font-bold text-blue-800 uppercase mb-1">Qtd *</label>
                <input type="number" name="qty_solicitada" step="0.01" min="0.01" required
                  value="{{ preselected_qty if preselected_qty > 0 else '' }}"
                  placeholder="0.00"
                  class="w-full px-2 py-2 rounded border border-blue-200 text-sm focus:ring-2 focus:ring-blue-500 text-right font-mono font-bold text-blue-900">
              </div>
            </div>

            <div class="border-t border-slate-200 pt-4 mt-2">
              <div class="flex items-center justify-between mb-2">
                <label class="block text-xs font-bold text-gray-700 uppercase">Escolha os Fornecedores:</label>
                <span class="text-xs text-amber-600 font-medium">
                  <i class="ph-fill ph-warning"></i> Marcação Obrigatória
                </span>
              </div>

              <div class="max-h-48 overflow-y-auto border border-slate-200 rounded-lg p-2 space-y-1 bg-white shadow-inner">
                {% for fornecedor in suppliers %}
                <label class="flex items-center gap-3 p-3 hover:bg-blue-50 border border-transparent hover:border-blue-100 rounded-lg cursor-pointer transition-colors">
                  <input type="checkbox" name="supplier_ids" value="{{ fornecedor.id }}"
                    class="w-5 h-5 text-blue-600 rounded border-gray-300">
                  <div class="flex-1">
                    <span class="text-sm font-bold text-gray-800">{{ fornecedor.nome }}</span>
                    <p class="text-[10px] text-gray-400 uppercase">
                      {% if fornecedor.whatsapp %}<i class="ph ph-whatsapp-logo text-green-500"></i> {{ fornecedor.whatsapp }}{% endif %}
                      {% if fornecedor.email %} · <i class="ph ph-envelope text-blue-400"></i> {{ fornecedor.email }}{% endif %}
                    </p>
                  </div>
                </label>
                {% else %}
                <div class="p-4 text-center text-sm text-gray-400">Nenhum fornecedor cadastrado.</div>
                {% endfor %}
              </div>
            </div>

            <button type="submit"
              class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-colors shadow-lg mt-4">
              <i class="ph-bold ph-paper-plane-tilt text-xl"></i> DISPARAR COTAÇÕES
            </button>
          </form>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var c = document.getElementById('dialog-container');
  if (c && window.Alpine) Alpine.initTree(c);
})();
</script>
