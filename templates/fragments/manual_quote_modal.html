<script type="text/plain" id="mq-mfg-map">{{ manufacturers_map | safe }}</script>
<script type="text/plain" id="mq-supplier-catalog">{{ supplier_catalog | safe }}</script>

<div x-data="manualQuote()" class="relative z-50" role="dialog" aria-modal="true">
  <div class="fixed inset-0 bg-gray-900 bg-opacity-60 backdrop-blur-sm" @click="closeModal()"></div>

  <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
    <div class="flex min-h-full items-center justify-center p-4">

      <div class="relative w-full max-w-2xl bg-white rounded-2xl shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
          <div class="flex items-center gap-2">
            <i class="ph-fill ph-hand-pointing text-blue-600 text-xl"></i>
            <h3 class="text-lg font-bold text-gray-900">Nova Cotação Avulsa</h3>
          </div>
          <button @click="closeModal()" class="text-gray-400 hover:text-gray-700 transition-colors">
            <i class="ph ph-x text-2xl"></i>
          </button>
        </div>

        <div class="p-6 space-y-5 max-h-[80vh] overflow-y-auto">

          <!-- Lista de Itens -->
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">
              1. Insumos a Cotar
            </label>

            <div class="space-y-3">
              <template x-for="(item, idx) in items" :key="item._key">
                <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 space-y-3">
                  <div class="flex items-center justify-between">
                    <span class="text-xs font-semibold text-slate-500 uppercase" x-text="'Item ' + (idx + 1)"></span>
                    <button type="button" @click="removeItem(idx)" x-show="items.length > 1"
                      class="text-red-400 hover:text-red-600 transition-colors">
                      <i class="ph ph-trash text-base"></i>
                    </button>
                  </div>

                  <!-- Insumo Base -->
                  <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Insumo Base *</label>
                    <select x-model="item.ingredient_id" @change="item.manufacturer_id = ''"
                      class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm bg-white focus:ring-2 focus:ring-blue-500">
                      <option value="">— Selecione o insumo —</option>
                      {% for ing in ingredients %}
                      <option value="{{ ing.id }}">{{ ing.nome }} ({{ ing.unidade }})</option>
                      {% endfor %}
                    </select>
                  </div>

                  <!-- Fabricante (opcional) -->
                  <div x-show="item.ingredient_id && getManufacturers(item.ingredient_id).length > 0">
                    <label class="block text-xs font-medium text-gray-600 mb-1">Fabricante / Marca (opcional)</label>
                    <select x-model="item.manufacturer_id"
                      class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm bg-white focus:ring-2 focus:ring-blue-500">
                      <option value="">— Qualquer fabricante —</option>
                      <template x-for="mfg in getManufacturers(item.ingredient_id)" :key="mfg.id">
                        <option :value="mfg.id" x-text="mfg.nome"></option>
                      </template>
                    </select>
                  </div>

                  <!-- Quantidade + Unidade -->
                  <div class="flex gap-2">
                    <div class="flex-1">
                      <label class="block text-xs font-medium text-gray-600 mb-1">Quantidade *</label>
                      <input type="number" x-model.number="item.quantidade" min="0.01" step="0.01" placeholder="Ex: 10"
                        class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="w-24">
                      <label class="block text-xs font-medium text-gray-600 mb-1">Unidade</label>
                      <select x-model="item.unidade"
                        class="w-full px-3 py-2 rounded-lg border border-slate-300 text-sm bg-white focus:ring-2 focus:ring-blue-500">
                        <option value="kg">kg</option>
                        <option value="g">g</option>
                        <option value="un">un</option>
                        <option value="L">L</option>
                        <option value="cx">cx</option>
                      </select>
                    </div>
                  </div>
                </div>
              </template>
            </div>

            <button type="button" @click="addItem()"
              class="mt-3 w-full py-2.5 border-2 border-dashed border-blue-300 text-blue-600 rounded-xl text-sm font-semibold hover:bg-blue-50 transition-colors flex items-center justify-center gap-2">
              <i class="ph ph-plus-circle"></i> Adicionar Outro Insumo
            </button>
          </div>

          <!-- Resumo dos itens -->
          <div x-show="validItems().length > 0" class="bg-blue-50 border border-blue-200 rounded-xl p-4">
            <p class="text-xs font-bold text-blue-700 uppercase mb-2">Resumo da Cotação</p>
            <ul class="space-y-1">
              <template x-for="item in validItems()" :key="item._key">
                <li class="text-sm text-blue-900 flex items-center gap-2">
                  <i class="ph ph-check-circle text-blue-500"></i>
                  <span x-text="getIngredientName(item.ingredient_id)"></span>
                  <span class="font-bold" x-text="'— ' + item.quantidade + ' ' + item.unidade"></span>
                  <template x-if="item.manufacturer_id">
                    <span class="text-xs text-blue-600" x-text="'(' + getManufacturerName(item.ingredient_id, item.manufacturer_id) + ')'"></span>
                  </template>
                </li>
              </template>
            </ul>
          </div>

          <!-- Seleção de Fornecedores -->
          <div>
            <div class="flex items-center justify-between mb-3">
              <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider">
                2. Enviar Cotação Para
              </label>
              <div class="flex gap-2">
                <button type="button" @click="selectAll()"
                  class="text-xs text-blue-600 hover:text-blue-800 font-medium">Marcar Todos</button>
                <span class="text-gray-300">|</span>
                <button type="button" @click="clearAll()"
                  class="text-xs text-gray-500 hover:text-gray-700 font-medium">Limpar</button>
              </div>
            </div>

            <div class="border border-slate-200 rounded-xl overflow-hidden divide-y divide-slate-100">
              {% for fornecedor in suppliers %}
              <label class="flex items-center gap-3 px-4 py-3 hover:bg-slate-50 cursor-pointer transition-colors">
                <input type="checkbox" value="{{ fornecedor.id }}" class="mq-supplier-cb w-4 h-4 text-blue-600 rounded border-gray-300"
                  @change="toggleSupplier('{{ fornecedor.id }}', $event.target.checked)">
                <div class="flex-1">
                  <p class="text-sm font-medium text-gray-800">{{ fornecedor.nome }}</p>
                  <p class="text-xs text-gray-400">
                    {% if fornecedor.whatsapp %}<span class="text-green-600"><i class="ph ph-whatsapp-logo"></i> {{ fornecedor.whatsapp }}</span>{% endif %}
                    {% if fornecedor.email %} · <span class="text-blue-500"><i class="ph ph-envelope"></i> {{ fornecedor.email }}</span>{% endif %}
                  </p>
                </div>
                <div class="flex gap-1">
                  {% if fornecedor.whatsapp %}<span class="w-5 h-5 rounded-full bg-green-100 flex items-center justify-center"><i class="ph-fill ph-whatsapp-logo text-green-600 text-xs"></i></span>{% endif %}
                  {% if fornecedor.email %}<span class="w-5 h-5 rounded-full bg-blue-100 flex items-center justify-center"><i class="ph-fill ph-envelope text-blue-500 text-xs"></i></span>{% endif %}
                </div>
              </label>
              {% else %}
              <div class="p-4 text-center text-sm text-gray-400">Nenhum fornecedor cadastrado.</div>
              {% endfor %}
            </div>

            <p class="text-xs text-gray-400 mt-2 flex items-center gap-1">
              <i class="ph ph-info"></i>
              <span x-text="selectedSuppliers.length + ' fornecedor(es) selecionado(s)'"></span>
            </p>
          </div>

          <!-- Erro / Aviso -->
          <div x-show="errorMsg" x-text="errorMsg"
            class="p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg"></div>

        </div>

        <!-- Rodapé com botão de submit -->
        <div class="bg-slate-50 border-t border-slate-200 px-6 py-4">
          <form id="mq-form" @submit.prevent="submitForm()">
            <input type="hidden" name="items_json" value="">
            <input type="hidden" name="supplier_ids_json" value="">
            <button type="submit"
              :disabled="validItems().length === 0 || selectedSuppliers.length === 0"
              :class="validItems().length === 0 || selectedSuppliers.length === 0
                ? 'bg-gray-300 cursor-not-allowed'
                : 'bg-blue-600 hover:bg-blue-700'"
              class="w-full py-3 text-white rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-colors shadow-sm">
              <i class="ph ph-paper-plane-tilt text-lg"></i>
              <span x-text="'Enviar Cotação para ' + selectedSuppliers.length + ' Fornecedor(es)'"></span>
            </button>
          </form>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
// Dados dos ingredientes (nome para o resumo)
window._mqIngredients = {
  {% for ing in ingredients %}
  "{{ ing.id }}": {{ ing.nome | tojson }},
  {% endfor %}
};

// Definição direta em window — não usa alpine:init para funcionar
// em conteúdo injetado dinamicamente via HTMX
window.manualQuote = function() {
  return {
    items: [],
    selectedSuppliers: [],
    manufacturersMap: {},
    errorMsg: '',

    init() {
      try {
        this.manufacturersMap = JSON.parse(
          document.getElementById('mq-mfg-map').textContent || '{}'
        );
      } catch(e) {}
      this.addItem();
    },

    closeModal() {
      document.getElementById('dialog-container').innerHTML = '';
    },

    addItem() {
      this.items.push({
        _key: Date.now() + Math.random(),
        ingredient_id: '',
        manufacturer_id: '',
        quantidade: '',
        unidade: 'kg'
      });
    },
    removeItem(idx) { this.items.splice(idx, 1); },

    validItems() {
      return this.items.filter(i => i.ingredient_id && parseFloat(i.quantidade) > 0);
    },

    getManufacturers(ingredient_id) {
      return this.manufacturersMap[ingredient_id] || [];
    },
    getIngredientName(ingredient_id) {
      return (window._mqIngredients || {})[ingredient_id] || ingredient_id;
    },
    getManufacturerName(ingredient_id, manufacturer_id) {
      const m = this.getManufacturers(ingredient_id).find(x => x.id === manufacturer_id);
      return m ? m.nome : '';
    },

    toggleSupplier(id, checked) {
      if (checked) {
        if (!this.selectedSuppliers.includes(id)) this.selectedSuppliers.push(id);
      } else {
        this.selectedSuppliers = this.selectedSuppliers.filter(s => s !== id);
      }
    },
    selectAll() {
      document.querySelectorAll('.mq-supplier-cb').forEach(cb => { cb.checked = true; });
      this.selectedSuppliers = [...document.querySelectorAll('.mq-supplier-cb')].map(cb => cb.value);
    },
    clearAll() {
      document.querySelectorAll('.mq-supplier-cb').forEach(cb => { cb.checked = false; });
      this.selectedSuppliers = [];
    },

    submitForm() {
      this.errorMsg = '';
      const valid = this.validItems();
      if (valid.length === 0) {
        this.errorMsg = 'Adicione pelo menos um insumo com quantidade.';
        return;
      }
      if (this.selectedSuppliers.length === 0) {
        this.errorMsg = 'Selecione pelo menos um fornecedor.';
        return;
      }
      const form = document.getElementById('mq-form');
      form.querySelector('[name=items_json]').value        = JSON.stringify(valid);
      form.querySelector('[name=supplier_ids_json]').value = JSON.stringify(this.selectedSuppliers);
      htmx.ajax('POST', '/api/purchasing/manual-quote', {
        source: form,
        target: '#dialog-container',
        swap: 'innerHTML'
      });
    }
  };
};

// Inicializar Alpine na div injetada (após definir window.manualQuote)
(function() {
  var c = document.getElementById('dialog-container');
  if (c && window.Alpine) Alpine.initTree(c);
})();
</script>
