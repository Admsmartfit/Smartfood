{% extends "base.html" %}
{% block page_title %}Fichas Técnicas{% endblock %}

{% block content %}
<div class="p-6 space-y-5 max-w-7xl mx-auto">

  <!-- Cabeçalho -->
  <div class="flex flex-wrap items-center justify-between gap-4">
    <div>
      <h1 class="text-xl font-bold text-gray-900">Fichas Técnicas (BOM)</h1>
      <p class="text-sm text-gray-500 mt-0.5">Estrutura de custo e ingredientes de cada produto</p>
    </div>
    <a href="/operations/bom/new"
       class="inline-flex items-center gap-2 px-4 py-2.5 rounded-lg
              bg-blue-600 text-white text-sm font-semibold
              hover:bg-blue-700 transition-colors min-h-[48px]">
      <i class="ph ph-plus text-lg"></i>
      Nova Ficha Técnica
    </a>
  </div>

  <!-- Busca live -->
  <div class="relative">
    <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
       aria-hidden="true"></i>
    <input type="search"
           name="q"
           placeholder="Buscar produto ou SKU..."
           class="w-full pl-9 pr-4 py-2.5 border border-slate-300 rounded-lg text-sm
                  focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
           hx-get="/api/bom/search"
           hx-target="#bom-table-body"
           hx-trigger="keyup changed delay:300ms, search"
           hx-include="[name='q']"
           aria-label="Buscar ficha técnica">
  </div>

  <!-- Tabela -->
  <div class="overflow-x-auto rounded-xl border border-slate-200 shadow-sm">
    <table class="w-full text-sm" role="table" aria-label="Fichas técnicas">
      <thead>
        <tr class="bg-slate-50 border-b border-slate-200">
          <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Produto</th>
          <th class="text-center px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Ingredientes</th>
          <th class="text-right px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">FC</th>
          <th class="text-right px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Custo</th>
          <th class="text-right px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Preço Sug.</th>
          <th class="text-right px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Margem</th>
          <th class="text-center px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Ações</th>
        </tr>
      </thead>
      <tbody id="bom-table-body" class="divide-y divide-slate-100"
             hx-get="/api/bom/search"
             hx-trigger="load"
             hx-swap="innerHTML">
        {% for _ in range(5) %}
        <tr class="animate-pulse">
          <td class="px-4 py-3"><div class="h-4 bg-slate-200 rounded w-40"></div></td>
          <td class="px-4 py-3 text-center"><div class="h-4 bg-slate-200 rounded w-6 mx-auto"></div></td>
          <td class="px-4 py-3 text-right"><div class="h-4 bg-slate-200 rounded w-12 ml-auto"></div></td>
          <td class="px-4 py-3 text-right"><div class="h-4 bg-slate-200 rounded w-16 ml-auto"></div></td>
          <td class="px-4 py-3 text-right"><div class="h-4 bg-slate-200 rounded w-16 ml-auto"></div></td>
          <td class="px-4 py-3 text-right"><div class="h-4 bg-slate-200 rounded w-10 ml-auto"></div></td>
          <td class="px-4 py-3 text-center"><div class="h-4 bg-slate-200 rounded w-12 mx-auto"></div></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

</div>
{% endblock %}
