<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Apontamento de Porções — SmartFood</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css" />
  <script>
    document.addEventListener('alpine:init', () => {
      document.body.addEventListener('showToast', e => {
        const d = e.detail;
        const t = document.createElement('div');
        t.className = `fixed top-4 right-4 z-50 px-4 py-3 rounded-xl shadow-lg text-white text-sm font-medium transition-all ${d.type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
        t.textContent = d.message;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3500);
      });
    });
  </script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Top bar -->
  <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
    <a href="/operations/production" class="text-gray-500 hover:text-gray-800">
      <i class="ph-bold ph-arrow-left text-xl"></i>
    </a>
    <div>
      <p class="text-xs text-gray-400 uppercase tracking-wide">Apontamento</p>
      <p class="font-semibold text-gray-800 text-sm leading-tight">Porcionamento de Lote</p>
    </div>
  </header>

  <!-- Fragment loaded via HTMX -->
  <main
    class="max-w-lg mx-auto py-6"
    hx-get="/api/production/{{ batch_id }}/apontamento"
    hx-trigger="load"
    hx-swap="innerHTML"
  >
    <!-- Skeleton -->
    <div class="space-y-4 p-4 animate-pulse">
      <div class="h-24 bg-gray-200 rounded-xl"></div>
      <div class="h-14 bg-gray-200 rounded-xl"></div>
      <div class="h-14 bg-gray-200 rounded-xl"></div>
      <div class="h-14 bg-gray-200 rounded-xl"></div>
      <div class="h-14 bg-green-100 rounded-xl"></div>
    </div>
  </main>

  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</body>
</html>
