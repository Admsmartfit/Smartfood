<!DOCTYPE html>
<html lang="pt-BR" x-data="appState()" x-init="init()">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1D4ED8" />
  <title>SmartFood Ops 360 — {% block title %}{% endblock %}</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: { 600: '#2563EB', 700: '#1D4ED8' }
          }
        }
      }
    }
  </script>

  <!-- NProgress (barra de carregamento) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nprogress@0.2.0/nprogress.css" />
  <script src="https://cdn.jsdelivr.net/npm/nprogress@0.2.0/nprogress.min.js"></script>
  <style>
    #nprogress .bar { background: #2563EB !important; height: 3px !important; }
    #nprogress .peg  { box-shadow: 0 0 10px #2563EB, 0 0 5px #2563EB !important; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
    /* Scroll suave no main */
    #main-content { scroll-behavior: smooth; }
  </style>

  <!-- HTMX 1.9 -->
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1" crossorigin="anonymous"></script>

  <!-- Alpine.js 3 -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/static/manifest.json" />

  {% block head %}{% endblock %}
</head>

<body class="bg-slate-50 text-gray-800 antialiased"
      hx-boost="true">

  <!-- ── Banner Offline ── -->
  <div x-show="isOffline"
       x-cloak
       x-transition
       class="fixed top-0 inset-x-0 z-[100] bg-yellow-400 text-yellow-900
              text-sm font-medium text-center py-2 px-4 flex items-center justify-center gap-2">
    <i class="ph ph-wifi-slash" aria-hidden="true"></i>
    Modo Offline — dados salvos localmente. Reconectando...
  </div>

  <!-- ── Toast Container ── -->
  <div id="toast-container"
       class="fixed bottom-4 right-4 z-[200] space-y-2 pointer-events-none"
       style="min-width:280px">
    <template x-for="toast in toasts" :key="toast.id">
      <div x-show="true"
           x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="opacity-0 translate-y-2"
           x-transition:enter-end="opacity-100 translate-y-0"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="opacity-100"
           x-transition:leave-end="opacity-0"
           :class="'pointer-events-auto flex items-start gap-3 px-4 py-3 rounded-xl shadow-lg border-l-4 ' + toastColor(toast.type)"
           role="alert">
        <span class="text-lg" x-text="toastIcon(toast.type)" aria-hidden="true"></span>
        <span class="flex-1 text-sm font-medium" x-text="toast.message"></span>
        <button @click="removeToast(toast.id)"
                class="text-gray-400 hover:text-gray-600 ml-1 p-2 -mr-1 rounded"
                aria-label="Fechar notificação">
          <i class="ph ph-x text-base"></i>
        </button>
      </div>
    </template>
  </div>

  <!-- ── Layout Principal ── -->
  <div class="flex h-screen overflow-hidden" :class="{ 'pt-8': isOffline }">

    <!-- Overlay mobile (fecha sidebar) -->
    <div x-show="sidebarOpen && window.innerWidth < 768"
         x-cloak
         @click="sidebarOpen = false"
         class="fixed inset-0 bg-black/40 z-30 md:hidden"
         aria-hidden="true">
    </div>

    <!-- ── Sidebar ── -->
    {% include "includes/sidebar.html" %}

    <!-- ── Área Principal ── -->
    <div class="flex-1 flex flex-col overflow-hidden min-w-0">

      <!-- ── Topbar ── -->
      {% include "includes/topbar.html" %}

      <!-- ── Conteúdo ── -->
      <main id="main-content"
            class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8">
        {% block content %}{% endblock %}
      </main>

    </div>
  </div><!-- fim layout -->

  <!-- Scripts -->
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}

</body>
</html>
