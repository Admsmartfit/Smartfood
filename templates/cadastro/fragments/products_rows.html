{% for p in items %}
<tr class="odd:bg-white even:bg-slate-50 text-sm" id="prd-{{ p.id }}">
  <td class="px-4 py-2 font-medium text-gray-900">{{ p.nome }}</td>
  <td class="px-4 py-2 text-gray-500">{{ p.sku or '—' }}</td>
  <td class="px-4 py-2 text-gray-500 hidden md:table-cell">{{ p.categoria or '—' }}</td>
  <td class="px-4 py-2 text-right text-gray-700">{{ "%.1f" | format(p.markup or 0) }}×</td>
  <td class="px-4 py-2 text-right text-gray-700">{{ "%.0f" | format(p.margem_minima or 0) }}%</td>
</tr>
{% else %}
<tr><td colspan="5" class="px-4 py-8 text-center text-sm text-gray-400">Nenhum produto cadastrado.</td></tr>
{% endfor %}
