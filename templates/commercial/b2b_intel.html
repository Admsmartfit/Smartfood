{% extends "base.html" %}
{% block page_title %}Inteligencia B2B{% endblock %}

{% block content %}
<div class="p-6 space-y-5 max-w-7xl mx-auto">

  <!-- Cabecalho -->
  <div class="flex flex-wrap items-center justify-between gap-4">
    <div>
      <h1 class="text-xl font-bold text-gray-900">Reposicao Proativa</h1>
      <p class="text-sm text-gray-500 mt-0.5">Clientes com risco de ruptura — envie reposicao em 1 clique</p>
    </div>
    <button class="text-sm text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1.5"
            hx-get="/api/b2b/fragments/intel"
            hx-target="#intel-cards"
            hx-swap="innerHTML">
      <i class="ph ph-arrows-clockwise" aria-hidden="true"></i> Atualizar
    </button>
  </div>

  <!-- Cards de reposicao -->
  <div id="intel-cards"
       hx-get="/api/b2b/fragments/intel"
       hx-trigger="load"
       hx-swap="innerHTML">
    <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-4 animate-pulse">
      {% for _ in range(6) %}
      <div class="bg-white rounded-xl border border-slate-200 p-5 space-y-3 border-l-4 border-l-slate-200">
        <div class="flex justify-between">
          <div class="h-4 bg-slate-200 rounded w-28"></div>
          <div class="h-5 bg-slate-200 rounded-full w-16"></div>
        </div>
        <div class="space-y-2">
          <div class="h-3 bg-slate-100 rounded w-full"></div>
          <div class="h-3 bg-slate-100 rounded w-5/6"></div>
        </div>
        <div class="h-10 bg-slate-200 rounded-lg w-full"></div>
      </div>
      {% endfor %}
    </div>
  </div>

</div>
{% endblock %}
