{% extends "base.html" %}
{% block page_title %}Pedidos B2B{% endblock %}

{% block content %}
<div class="p-6 space-y-5 max-w-full">

  <!-- Cabecalho -->
  <div class="flex flex-wrap items-center justify-between gap-4">
    <div>
      <h1 class="text-xl font-bold text-gray-900">Pedidos B2B</h1>
      <p class="text-sm text-gray-500 mt-0.5">Pipeline Kanban</p>
    </div>
    <button class="text-sm text-blue-600 hover:text-blue-800 font-medium"
            hx-get="/api/b2b/fragments/orders-board"
            hx-target="#orders-kanban"
            hx-swap="innerHTML">
      <i class="ph ph-arrows-clockwise" aria-hidden="true"></i> Atualizar
    </button>
  </div>

  <!-- Kanban -->
  <div id="orders-kanban"
       hx-get="/api/b2b/fragments/orders-board"
       hx-trigger="load"
       hx-swap="innerHTML">
    <div class="flex gap-4 overflow-x-auto pb-4 animate-pulse">
      {% for _ in range(5) %}
      <div class="flex-shrink-0 w-72 space-y-3">
        <div class="h-7 bg-slate-200 rounded-full w-28"></div>
        <div class="h-28 bg-slate-100 rounded-xl border border-slate-200"></div>
        <div class="h-28 bg-slate-100 rounded-xl border border-slate-200"></div>
      </div>
      {% endfor %}
    </div>
  </div>

</div>
{% endblock %}
