<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SmartFood - Chão de Fábrica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/phosphor-icons"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="manifest" href="/static/manifest.json">
  <style>
    /* Esconde elementos Alpine.js antes de carregarem */
    [x-cloak] { display: none !important; }
    /* Previne o zoom acidental com duplo clique em tablets */
    * { touch-action: manipulation; }
  </style>
</head>
<body class="bg-slate-100 text-gray-900 pb-20 font-sans select-none" x-data="mobileApp()" x-init="initApp()">

  <header class="bg-gray-900 text-white p-4 sticky top-0 z-50 shadow-md flex items-center justify-between">
     <div class="flex items-center gap-3" @click="view = 'dashboard'">
        <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
          <i class="ph-fill ph-chef-hat text-white text-xl"></i>
        </div>
        <div>
          <h1 class="font-bold text-lg leading-tight">Chão de Fábrica</h1>
          <p class="text-xs text-gray-400">Tablet do Operador</p>
        </div>
     </div>
  </header>

  <div x-show="view === 'dashboard'" x-cloak class="p-4 space-y-4 max-w-2xl mx-auto">
     <h2 class="font-bold text-gray-500 uppercase tracking-wider text-sm mb-2 flex items-center gap-2">
        <i class="ph ph-factory text-lg"></i> Ordens Liberadas
     </h2>
     
     <template x-if="ops.length === 0">
        <div class="bg-white p-8 rounded-2xl text-center border border-dashed border-gray-300">
           <i class="ph ph-check-circle text-5xl text-gray-300 mb-2"></i>
           <p class="text-gray-500">Nenhuma ordem pendente no momento.</p>
        </div>
     </template>

     <template x-for="op in ops" :key="op.id">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 active:bg-slate-50 transition-colors" @click="openOp(op.id)">
           <div class="flex justify-between items-start mb-3">
              <span class="text-[10px] font-bold uppercase px-2 py-1 rounded-full"
                    :class="op.status === 'EM_PRODUCAO' ? 'bg-blue-100 text-blue-800' : 'bg-amber-100 text-amber-800'"
                    x-text="op.status === 'EM_PRODUCAO' ? 'EM PRODUÇÃO' : 'AGUARDANDO INÍCIO'"></span>
              <span class="text-xs text-gray-400 font-mono" x-text="op.id.substring(0,8)"></span>
           </div>
           <h3 class="font-bold text-xl text-gray-900 leading-tight" x-text="op.produto"></h3>
           <p class="text-gray-600 mt-2 text-sm">Meta Lote: <strong class="text-gray-900 text-lg" x-text="op.quantidade_planejada"></strong> un.</p>
        </div>
     </template>
  </div>

  <div x-show="view === 'op_detail'" x-cloak class="p-4 max-w-2xl mx-auto">
     <template x-if="currentOp">
       <div class="space-y-5">
          
          <button @click="view = 'dashboard'" class="flex items-center gap-2 text-blue-600 font-semibold py-2 px-1 active:opacity-50">
             <i class="ph ph-caret-left text-2xl"></i> Voltar à Lista
          </button>

          <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 border-l-4 border-l-blue-600">
             <h2 class="font-bold text-2xl text-gray-900 leading-tight" x-text="currentOp.produto"></h2>
             <p class="text-gray-500 mt-1">Planeado: <strong class="text-gray-900 text-xl" x-text="currentOp.quantidade_planejada"></strong> un.</p>
          </div>

          <div x-show="currentOp.status === 'APROVADA' || currentOp.status === 'pendente'" x-transition>
             <div class="bg-amber-50 border border-amber-200 rounded-2xl p-5 shadow-sm">
                <h3 class="font-bold text-amber-900 flex items-center gap-2 mb-2 text-lg">
                   <i class="ph-fill ph-scales text-2xl"></i> 1. Mise en Place
                </h3>
                <p class="text-sm text-amber-800 mb-4 leading-relaxed">Separe e pese rigorosamente os ingredientes abaixo antes de ir para a cozinha.</p>
                
                <ul class="divide-y divide-amber-200/50 bg-white rounded-xl border border-amber-100 overflow-hidden">
                   <template x-for="ing in currentOp.ingredientes" :key="ing.ingrediente_id">
                      <li class="p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                         <span class="font-semibold text-gray-800 text-base" x-text="ing.nome"></span>
                         <div class="bg-amber-100 text-amber-900 px-3 py-1.5 rounded-lg font-mono font-bold text-lg text-center shadow-inner">
                            <span x-text="ing.quantidade_necessaria"></span> <span class="text-sm" x-text="ing.unidade"></span>
                         </div>
                      </li>
                   </template>
                </ul>

                <button @click="startProducao()" class="w-full mt-6 bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-white font-bold text-lg py-5 rounded-2xl shadow-md flex items-center justify-center gap-2 transition-colors">
                   <i class="ph-fill ph-play-circle text-3xl"></i> CONFIRMAR SEPARAÇÃO
                </button>
             </div>
          </div>

          <div x-show="currentOp.status === 'EM_PRODUCAO'" x-transition>
             
             <div class="bg-blue-50 border border-blue-200 rounded-2xl p-5 shadow-sm">
                <h3 class="font-bold text-blue-900 flex items-center gap-2 mb-4 text-lg">
                   <i class="ph-fill ph-cooking-pot text-2xl"></i> 2. Processo de Produção
                </h3>
                <div class="bg-white rounded-xl p-5 border border-blue-100 text-gray-800 text-base leading-relaxed whitespace-pre-wrap font-medium" 
                     x-text="currentOp.modo_preparo"></div>
             </div>

             <div class="mt-5 bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                <h3 class="font-bold text-gray-900 flex items-center gap-2 mb-2 text-lg">
                   <i class="ph-fill ph-check-square text-2xl text-green-600"></i> 3. Conclusão do Lote
                </h3>
                <p class="text-sm text-gray-500 mb-4">Insira a quantidade exata que rendeu no final do processo.</p>
                
                <div class="flex items-center gap-3 mb-6">
                   <input type="number" x-model.number="qtdReal" 
                          class="w-full bg-slate-50 border-2 border-slate-300 rounded-xl px-4 py-4 text-3xl font-bold text-center focus:border-green-500 outline-none transition-colors" 
                          placeholder="0">
                   <span class="text-xl font-bold text-gray-400">un.</span>
                </div>
                
                <button @click="finishProducao()" class="w-full bg-green-600 hover:bg-green-700 active:bg-green-800 text-white font-bold text-lg py-5 rounded-2xl shadow-md flex items-center justify-center gap-2 transition-colors">
                   <i class="ph-fill ph-floppy-disk text-3xl"></i> FINALIZAR ORDEM
                </button>
             </div>

          </div>

       </div>
     </template>
  </div>

  <script>
  function mobileApp() {
     return {
        view: 'dashboard',
        ops: [],
        currentOp: null,
        qtdReal: null,

        initApp() {
           this.loadOps();
           // Recarrega a lista a cada 20 segundos se estiver no ecrã inicial
           setInterval(() => { if(this.view === 'dashboard') this.loadOps(); }, 20000);
        },

        async loadOps() {
           try {
              const res = await fetch('/mobile/production-orders/active');
              if(res.ok) this.ops = await res.json();
           } catch (e) {
              console.error('Erro ao carregar OPs:', e);
           }
        },

        async openOp(id) {
           try {
              const res = await fetch('/mobile/production-orders/' + id);
              if(res.ok) {
                 this.currentOp = await res.json();
                 this.qtdReal = this.currentOp.quantidade_planejada;
                 window.scrollTo(0,0);
                 this.view = 'op_detail';
              } else {
                 alert('Não foi possível carregar os detalhes da Ordem.');
              }
           } catch(e) {
              alert('Erro de conexão ao carregar a OP.');
           }
        },

        async startProducao() {
           try {
              const res = await fetch(`/mobile/production-orders/${this.currentOp.id}/quick-start`, {
                 method: 'POST',
                 headers: {'Content-Type': 'application/json'},
                 body: JSON.stringify({operador_id: 'Operador Tablet'})
              });
              if(res.ok) {
                 // Avança para a Fase 2 localmente! O Ecrã muda imediatamente.
                 this.currentOp.status = 'EM_PRODUCAO';
                 window.scrollTo(0,0);
              } else {
                 const err = await res.json();
                 alert('Erro ao iniciar: ' + (err.detail || 'Desconhecido'));
              }
           } catch(e) {
              alert('Erro de conexão ao iniciar OP.');
           }
        },

        async finishProducao() {
           if(!this.qtdReal || this.qtdReal <= 0) {
              alert("Por favor, informe a quantidade real produzida.");
              return;
           }
           
           if(confirm(`Confirma a produção final de ${this.qtdReal} unidades? O estoque será atualizado.`)) {
              try {
                 const res = await fetch(`/mobile/production-orders/${this.currentOp.id}/complete`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({quantidade_real: this.qtdReal})
                 });
                 if(res.ok) {
                    alert('Ordem Concluída com Sucesso!');
                    this.view = 'dashboard';
                    this.loadOps(); // Atualiza a lista, removendo a OP que acabou de ser concluída
                 } else {
                    const err = await res.json();
                    alert('Erro ao concluir: ' + (err.detail || 'Desconhecido'));
                 }
              } catch(e) {
                 alert('Erro de conexão ao concluir OP.');
              }
           }
        }
     }
  }
  </script>
</body>
</html>
