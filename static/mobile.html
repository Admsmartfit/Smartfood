<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tablet de Produção</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/phosphor-icons"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    * { touch-action: manipulation; }
  </style>
</head>
<body class="bg-slate-100 text-gray-900 font-sans select-none"
      x-data="kitchenApp()"
      x-init="initApp()">

  <!-- Header -->
  <header class="bg-gray-900 text-white px-5 py-4 sticky top-0 z-50 shadow-md flex items-center justify-between">
    <div class="flex items-center gap-4 cursor-pointer" @click="view = 'dashboard'">
      <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shrink-0">
        <i class="ph-fill ph-chef-hat text-white text-3xl"></i>
      </div>
      <div>
        <h1 class="font-bold text-2xl leading-tight">Painel da Cozinha</h1>
        <p class="text-sm text-gray-400">Tablet do Operador</p>
      </div>
    </div>
    <div x-show="view === 'execution' && currentOp" x-cloak class="text-right hidden sm:block">
      <p class="text-xs text-gray-400 uppercase tracking-wide">Em execução</p>
      <p class="font-bold text-white truncate max-w-[180px]" x-text="currentOp?.produto"></p>
    </div>
  </header>

  <!-- ── DASHBOARD: Fila de Produção ──────────────────────────────────────── -->
  <div x-show="view === 'dashboard'" x-cloak class="p-6 max-w-3xl mx-auto space-y-4">

    <div class="flex items-center justify-between mb-2">
      <h2 class="font-bold text-gray-500 uppercase tracking-wider text-lg flex items-center gap-2">
        <i class="ph ph-cooking-pot text-2xl"></i> Fila de Produção
      </h2>
      <button @click="loadOps()"
              class="flex items-center gap-1 text-sm text-blue-600 font-semibold py-1 px-3 rounded-lg border border-blue-200 hover:bg-blue-50 transition-colors">
        <i class="ph ph-arrows-clockwise"></i> Atualizar
      </button>
    </div>

    <div x-show="ops.length === 0" class="bg-white rounded-2xl p-10 text-center border border-slate-200 shadow-sm">
      <i class="ph ph-factory text-5xl text-gray-300 block mb-3"></i>
      <p class="text-gray-500 font-medium text-lg">Nenhuma ordem em aberto.</p>
      <p class="text-gray-400 text-sm mt-1">Aguarde o lançamento de uma nova OP pelo gestor.</p>
    </div>

    <template x-for="op in ops" :key="op.id">
      <div class="bg-white p-6 rounded-2xl shadow-sm border-2 transition-all cursor-pointer active:scale-[0.98]"
           :class="op.status === 'EM_PRODUCAO' ? 'border-blue-400' : 'border-slate-200 hover:border-blue-300'"
           @click="openOp(op)">
        <div class="flex justify-between items-start mb-3">
          <span class="text-sm font-bold uppercase px-3 py-1 rounded-full"
                :class="op.status === 'EM_PRODUCAO' ? 'bg-blue-100 text-blue-800' : 'bg-purple-100 text-purple-800'"
                x-text="op.status === 'EM_PRODUCAO' ? 'Em Produção' : 'Aguardando'">
          </span>
          <span class="text-sm text-gray-400 font-mono">OP: <span x-text="op.id.substring(0,8)"></span></span>
        </div>
        <h3 class="font-bold text-3xl text-gray-900 leading-tight" x-text="op.produto"></h3>
        <p class="text-gray-500 mt-2 text-xl">
          Meta: <strong class="text-gray-900" x-text="op.quantidade_planejada"></strong> un.
        </p>
        <div class="mt-4 flex items-center gap-2 text-blue-600 font-semibold text-base">
          <i class="ph ph-arrow-circle-right text-xl"></i> Toque para abrir
        </div>
      </div>
    </template>
  </div>

  <!-- ── EXECUTION: 3 Sub-Ecrãs ───────────────────────────────────────────── -->
  <div x-show="view === 'execution'" x-cloak class="p-4 max-w-3xl mx-auto">
    <template x-if="currentOp">
      <div class="space-y-5">

        <button @click="view = 'dashboard'"
                class="flex items-center gap-1 text-blue-600 font-bold text-xl py-2 px-1">
          <i class="ph ph-caret-left text-3xl"></i> Voltar à Fila
        </button>

        <!-- Título da OP -->
        <div class="bg-white rounded-2xl px-6 py-4 border border-slate-200 shadow-sm">
          <p class="text-xs text-gray-400 uppercase tracking-wider">Ordem de Produção</p>
          <h2 class="font-bold text-2xl text-gray-900 mt-0.5" x-text="currentOp.produto"></h2>
          <p class="text-gray-500 text-lg mt-1">
            Meta: <strong x-text="currentOp.quantidade_planejada"></strong> unidades
          </p>
        </div>

        <!-- Tabs -->
        <div class="flex rounded-xl bg-slate-200 p-1.5 gap-1.5">
          <button @click="subView = 'mise'"
                  :class="subView === 'mise' ? 'bg-white shadow text-amber-600' : 'text-gray-500 hover:text-gray-700'"
                  class="flex-1 py-4 text-lg font-bold rounded-lg transition-all text-center">
            <i class="ph ph-list-checks block text-2xl mb-1"></i>
            <span class="text-sm">1. Mise en Place</span>
          </button>
          <button @click="subView = 'recipe'"
                  :class="subView === 'recipe' ? 'bg-white shadow text-blue-600' : 'text-gray-500 hover:text-gray-700'"
                  class="flex-1 py-4 text-lg font-bold rounded-lg transition-all text-center">
            <i class="ph ph-book-open block text-2xl mb-1"></i>
            <span class="text-sm">2. Receita</span>
          </button>
          <button @click="subView = 'finish'"
                  :class="subView === 'finish' ? 'bg-white shadow text-green-600' : 'text-gray-500 hover:text-gray-700'"
                  class="flex-1 py-4 text-lg font-bold rounded-lg transition-all text-center">
            <i class="ph ph-flag-checkered block text-2xl mb-1"></i>
            <span class="text-sm">3. Concluir</span>
          </button>
        </div>

        <!-- ── SUB-ECRÃ 1: Mise en Place ─────────────────────────────────── -->
        <div x-show="subView === 'mise'"
             class="bg-white border-2 border-amber-200 rounded-2xl p-6 shadow-sm space-y-4">
          <h3 class="font-bold text-amber-900 text-2xl flex items-center gap-2">
            <i class="ph ph-list-checks text-amber-500"></i> Separação de Ingredientes
          </h3>
          <p class="text-gray-500 text-base">Confirme cada ingrediente antes de iniciar o preparo.</p>

          <ul class="space-y-3">
            <template x-for="(ing, index) in currentOp.ingredientes" :key="index">
              <label class="flex items-center gap-4 p-5 rounded-xl border-2 cursor-pointer transition-colors"
                     :class="checklist[index] ? 'border-green-400 bg-green-50' : 'border-slate-100 bg-slate-50 active:bg-amber-50'">
                <input type="checkbox" x-model="checklist[index]"
                       class="w-8 h-8 text-green-500 rounded-lg focus:ring-green-400 border-gray-300 shrink-0">
                <div class="flex-1 min-w-0">
                  <span class="font-bold text-xl text-gray-800" x-text="ing.nome"></span>
                  <div x-show="ing.suficiente === false"
                       class="text-xs text-red-600 font-semibold mt-0.5 flex items-center gap-1">
                    <i class="ph ph-warning"></i> Estoque insuficiente
                  </div>
                </div>
                <div class="bg-amber-100 text-amber-900 px-4 py-2 rounded-xl font-mono font-bold text-xl text-center shadow-inner shrink-0">
                  <span x-text="ing.quantidade_necessaria"></span>
                  <span class="text-sm font-medium" x-text="' ' + ing.unidade"></span>
                </div>
              </label>
            </template>
          </ul>

          <div class="flex items-center justify-between text-sm text-gray-500 pt-1">
            <span>
              <span class="font-bold text-green-600" x-text="checklist.filter(Boolean).length"></span>
              / <span x-text="currentOp.ingredientes.length"></span> separados
            </span>
            <span x-show="checklist.length > 0 && checklist.every(Boolean)"
                  class="text-green-600 font-semibold flex items-center gap-1">
              <i class="ph-fill ph-check-circle"></i> Tudo pronto!
            </span>
          </div>

          <button @click="subView = 'recipe'"
                  class="w-full mt-2 bg-amber-500 hover:bg-amber-600 text-white font-bold text-2xl py-6 rounded-2xl shadow-md transition-colors flex items-center justify-center gap-3">
            TUDO SEPARADO <i class="ph-bold ph-arrow-right"></i>
          </button>
        </div>

        <!-- ── SUB-ECRÃ 2: Modo de Preparo ────────────────────────────────── -->
        <div x-show="subView === 'recipe'"
             class="bg-white border-2 border-blue-200 rounded-2xl p-6 shadow-sm space-y-4">
          <h3 class="font-bold text-blue-900 text-2xl flex items-center gap-2">
            <i class="ph ph-book-open text-blue-500"></i> Modo de Preparo
          </h3>
          <div class="text-gray-800 text-xl leading-loose whitespace-pre-wrap font-medium bg-blue-50 p-6 rounded-xl border border-blue-100"
               x-text="currentOp.modo_preparo"></div>

          <button @click="subView = 'finish'"
                  class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white font-bold text-2xl py-6 rounded-2xl shadow-md transition-colors flex items-center justify-center gap-3">
            PRONTO PARA CONCLUIR <i class="ph-bold ph-arrow-right"></i>
          </button>
        </div>

        <!-- ── SUB-ECRÃ 3: Conclusão ──────────────────────────────────────── -->
        <div x-show="subView === 'finish'"
             class="bg-white border-2 border-green-200 rounded-2xl p-6 shadow-sm space-y-5">
          <h3 class="font-bold text-green-900 text-2xl flex items-center gap-2">
            <i class="ph ph-flag-checkered text-green-500"></i> Conclusão do Lote
          </h3>
          <p class="text-gray-600 text-lg">Insira a quantidade exata que rendeu no final do processo.</p>

          <div class="space-y-2">
            <label class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Quantidade produzida</label>
            <input type="number" x-model.number="qtdReal" min="0.1" step="0.1"
                   class="w-full bg-slate-50 border-4 border-slate-300 focus:border-green-500 rounded-2xl px-6 py-8 text-5xl font-bold text-center outline-none transition-colors"
                   placeholder="0">
          </div>

          <div x-show="qtdReal > 0"
               class="flex items-center justify-between bg-slate-50 rounded-xl px-4 py-3 text-base border border-slate-200">
            <span class="text-gray-500">Meta: <strong x-text="currentOp.quantidade_planejada"></strong></span>
            <span class="font-bold"
                  :class="qtdReal >= currentOp.quantidade_planejada ? 'text-green-600' : 'text-amber-600'">
              Rendimento:
              <span x-text="currentOp.quantidade_planejada > 0
                ? Math.round(qtdReal / currentOp.quantidade_planejada * 100) + '%'
                : '—'">
              </span>
            </span>
          </div>

          <div x-show="errorMsg"
               class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl font-medium flex items-center gap-2">
            <i class="ph ph-warning-circle text-xl"></i>
            <span x-text="errorMsg"></span>
          </div>

          <button @click="finishProducao()"
                  :disabled="saving || !qtdReal"
                  :class="(saving || !qtdReal) ? 'bg-green-300 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700'"
                  class="w-full text-white font-bold text-2xl py-6 rounded-2xl shadow-md transition-colors flex items-center justify-center gap-3">
            <span x-show="saving">A guardar...</span>
            <span x-show="!saving" class="flex items-center gap-3">
              <i class="ph-bold ph-check-circle text-3xl"></i> SALVAR E CONCLUIR
            </span>
          </button>
        </div>

      </div>
    </template>
  </div>

  <script>
  function kitchenApp() {
    return {
      view: 'dashboard',
      subView: 'mise',
      ops: [],
      currentOp: null,
      checklist: [],
      qtdReal: null,
      saving: false,
      errorMsg: '',

      initApp() {
        this.loadOps();
        setInterval(() => { if (this.view === 'dashboard') this.loadOps(); }, 30000);
      },

      async loadOps() {
        try {
          const res = await fetch('/mobile/production-orders/active');
          if (res.ok) this.ops = await res.json();
        } catch (e) {
          console.error('Erro ao carregar OPs:', e);
        }
      },

      async openOp(opData) {
        try {
          const res = await fetch('/mobile/production-orders/' + opData.id);
          if (!res.ok) { alert('Erro ao carregar detalhes da OP.'); return; }
          this.currentOp = await res.json();
          this.checklist = this.currentOp.ingredientes.map(() => false);
          this.qtdReal = this.currentOp.quantidade_planejada;
          this.subView = 'mise';
          this.errorMsg = '';
          this.view = 'execution';
          window.scrollTo(0, 0);
        } catch (e) {
          alert('Erro de ligação. Verifique a rede.');
        }
      },

      async finishProducao() {
        if (!this.qtdReal || this.qtdReal <= 0) {
          this.errorMsg = 'Informe a quantidade produzida.';
          return;
        }
        this.saving = true;
        this.errorMsg = '';
        try {
          const res = await fetch('/mobile/production-orders/' + this.currentOp.id + '/complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ quantidade_real: this.qtdReal }),
          });
          const data = await res.json();
          if (res.ok && data.ok) {
            this.view = 'dashboard';
            this.currentOp = null;
            await this.loadOps();
          } else {
            this.errorMsg = data.detail || 'Erro ao concluir a ordem.';
          }
        } catch (e) {
          this.errorMsg = 'Erro de ligação. Tente novamente.';
        } finally {
          this.saving = false;
        }
      },
    };
  }
  </script>
</body>
</html>
